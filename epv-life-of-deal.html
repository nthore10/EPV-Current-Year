<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPV — Life of Deal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --primary:#0A0A0A;--accent:#C8102E;--accent-light:#FFF0F2;--surface:#FFFFFF;
    --surface-2:#F5F4F0;--surface-3:#EDECEA;--ink:#0A0A0A;--ink-secondary:#5A5A5A;
    --ink-muted:#9A9A9A;--border:rgba(0,0,0,0.10);--border-strong:rgba(0,0,0,0.22);
    --success:#1A7A4A;--success-bg:#EBF8F1;--info:#1E5FA8;--info-bg:#EBF2FC;
    --font-display:'Bebas Neue',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'DM Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font-body);background:var(--surface-2);color:var(--ink);min-height:100vh;}
  .masthead{background:var(--primary);padding:20px 24px 18px;display:flex;align-items:center;justify-content:center;text-align:center;border-bottom:3px solid var(--accent);}
  .masthead-wordmark{font-family:var(--font-display);font-size:32px;color:#fff;letter-spacing:1.5px;line-height:1;}
  .masthead-wordmark span{color:var(--accent);}
  .masthead-sub{font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,0.45);letter-spacing:2px;padding-bottom:3px;}
  .controls{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  .controls input,.controls select{font-family:var(--font-body);font-size:13px;padding:8px 12px;border:1px solid var(--border-strong);border-radius:6px;background:var(--surface);color:var(--ink);outline:none;transition:border-color .15s;}
  .controls input:focus,.controls select:focus{border-color:var(--accent);}
  .controls input{min-width:220px;}.controls select{min-width:170px;}
  .ctrl-label{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-muted);}
  .loading{padding:80px;text-align:center;color:var(--ink-muted);}
  .spinner{border:3px solid var(--surface-3);border-top:3px solid var(--accent);border-radius:50%;width:36px;height:36px;animation:spin .8s linear infinite;margin:0 auto 16px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading p{font-family:var(--font-mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;}
  .table-container{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead{background:var(--primary);position:sticky;top:0;z-index:10;}
  th{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.55);padding:12px 12px 10px;text-align:left;cursor:pointer;user-select:none;white-space:nowrap;transition:color .15s;border-bottom:2px solid var(--accent);}
  th:hover{color:#fff;}
  th.sorted-asc::after{content:' ▲';color:var(--accent);font-size:8px;}
  th.sorted-desc::after{content:' ▼';color:var(--accent);font-size:8px;}
  th.align-right{text-align:right;}
  tbody tr{border-bottom:1px solid var(--border);background:var(--surface);transition:background .1s;}
  tbody tr:hover{background:var(--surface-2);}
  td{padding:11px 12px;vertical-align:middle;}
  td.align-right{text-align:right;font-family:var(--font-mono);font-size:12px;}
  .logo-cell{display:flex;align-items:center;gap:10px;}
  .team-logo{width:28px;height:28px;object-fit:contain;flex-shrink:0;}
  .player-name{font-weight:600;font-size:13px;}
  .team-name-text{font-size:11px;color:var(--ink-muted);font-family:var(--font-mono);}
  .contract-badge{display:inline-block;font-family:var(--font-mono);font-size:9px;letter-spacing:1px;padding:3px 8px;border-radius:3px;font-weight:500;text-transform:uppercase;}
  .badge-rookie{background:var(--info-bg);color:var(--info);}
  .badge-max{background:var(--accent-light);color:var(--accent);}
  .badge-veteran{background:var(--surface-3);color:var(--ink-secondary);}
  .badge-standard{background:var(--success-bg);color:var(--success);}
  .badge-default{background:var(--surface-3);color:var(--ink-muted);}
  .val-positive{color:var(--success);font-weight:600;}
  .val-negative{color:var(--accent);font-weight:600;}
  .stats-bar{background:var(--primary);padding:16px 24px;display:flex;gap:32px;flex-wrap:wrap;}
  .stat-item{display:flex;flex-direction:column;gap:3px;}
  .stat-label{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.4);}
  .stat-value{font-family:var(--font-display);font-size:24px;color:#fff;line-height:1;}
  @media(max-width:768px){.controls{flex-direction:column;}.controls input,.controls select{width:100%;}td,th{padding:8px;}}
</style>
</head>
<body>

<div class="masthead">
  <div class="masthead-wordmark">EPV <span>LIFE OF DEAL</span></div>
  
</div>

<div id="loadingSection" class="loading">
  <div class="spinner"></div><p>Loading contract data...</p>
</div>

<div id="dataSection" style="display:none;">
  <div class="controls">
    <div><div class="ctrl-label" style="margin-bottom:4px;">Search</div>
      <input type="text" id="searchInput" placeholder="Player name..." oninput="filterTable()"></div>
    <div><div class="ctrl-label" style="margin-bottom:4px;">Team</div>
      <select id="teamFilter" onchange="filterTable()"><option value="">All Teams</option></select></div>
    <div><div class="ctrl-label" style="margin-bottom:4px;">Contract Type</div>
      <select id="contractFilter" onchange="filterTable()"><option value="">All Contract Types</option></select></div>
  </div>

  <div class="table-container">
    <table id="dataTable">
      <thead>
        <tr>
          <th onclick="sortTable(0)">Contract Type</th>
          <th onclick="sortTable(1)">Player</th>
          <th onclick="sortTable(2)">Team</th>
          <th onclick="sortTable(3)" class="align-right">Years Under Contract</th>
          <th onclick="sortTable(4)" class="align-right">$ Under Contract</th>
          <th onclick="sortTable(5)" class="align-right">Projected Value</th>
          <th onclick="sortTable(6)" class="align-right">Value Difference</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div class="stats-bar">
    <div class="stat-item"><div class="stat-label">Total Players</div><div class="stat-value" id="totalPlayers">0</div></div>
    <div class="stat-item"><div class="stat-label">Total $ Under Contract</div><div class="stat-value" id="totalUnderContract">$0</div></div>
    <div class="stat-item"><div class="stat-label">Total Projected Value</div><div class="stat-value" id="totalProjected">$0</div></div>
    <div class="stat-item"><div class="stat-label">Total Value Difference</div><div class="stat-value" id="totalDifference">$0</div></div>
  </div>
</div>

<script>
  let allData=[],filteredData=[],sortColumn=-1,sortAscending=true;
  const GOOGLE_SHEETS_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vQ9jJpsamj56RIR756PoJSOaRgPSc9yDZ5nkpWUjO-ECjRMGsBq_Q-_s4vPcpfCSg/pub?gid=1741426200&single=true&output=csv';
  const teamNameToCode={
    'Atlanta Hawks':'ATL','Boston Celtics':'BOS','Brooklyn Nets':'BKN','Charlotte Hornets':'CHO',
    'Chicago Bulls':'CHI','Cleveland Cavaliers':'CLE','Dallas Mavericks':'DAL','Denver Nuggets':'DEN',
    'Detroit Pistons':'DET','Golden State Warriors':'GSW','Houston Rockets':'HOU','Indiana Pacers':'IND',
    'LA Clippers':'LAC','Los Angeles Clippers':'LAC','LA Lakers':'LAL','Los Angeles Lakers':'LAL',
    'Memphis Grizzlies':'MEM','Miami Heat':'MIA','Milwaukee Bucks':'MIL','Minnesota Timberwolves':'MIN',
    'New Orleans Pelicans':'NOP','New York Knicks':'NYK','Oklahoma City Thunder':'OKC','Orlando Magic':'ORL',
    'Philadelphia 76ers':'PHI','Phoenix Suns':'PHX','Portland Trail Blazers':'POR','Sacramento Kings':'SAC',
    'San Antonio Spurs':'SAS','Toronto Raptors':'TOR','Utah Jazz':'UTA','Washington Wizards':'WAS'
  };
  const nbaIds={ATL:1610612737,BOS:1610612738,BKN:1610612751,CHO:1610612766,CHI:1610612741,CLE:1610612739,DAL:1610612742,DEN:1610612743,DET:1610612765,GSW:1610612744,HOU:1610612745,IND:1610612754,LAC:1610612746,LAL:1610612747,MEM:1610612763,MIA:1610612748,MIL:1610612749,MIN:1610612750,NOP:1610612740,NYK:1610612752,OKC:1610612760,ORL:1610612753,PHI:1610612755,PHX:1610612756,POR:1610612757,SAC:1610612758,SAS:1610612759,TOR:1610612761,UTA:1610612762,WAS:1610612764};
  function getLogoUrl(code){const id=nbaIds[code];return id?`https://cdn.nba.com/logos/nba/${id}/primary/L/logo.svg`:'';}
  function getContractClass(t){if(!t)return'badge-default';const s=t.toLowerCase();if(s.includes('rookie'))return'badge-rookie';if(s.includes('max'))return'badge-max';if(s.includes('veteran'))return'badge-veteran';if(s.includes('standard'))return'badge-standard';return'badge-default';}
  function parseNumber(v){if(!v&&v!==0)return 0;let s=v.toString().replace(/[$,"\s]/g,'');if(s.startsWith('(')&&s.endsWith(')'))s='-'+s.slice(1,-1);const n=parseFloat(s);return isNaN(n)?0:n;}
  function formatCurrency(v){return'$'+parseNumber(v).toLocaleString('en-US',{maximumFractionDigits:0});}

  window.addEventListener('DOMContentLoaded',()=>{
    Papa.parse(GOOGLE_SHEETS_URL,{
      download:true,header:true,skipEmptyLines:true,dynamicTyping:false,
      complete(results){
        if(results.data?.length>0){
          processData(results.data);
          document.getElementById('loadingSection').style.display='none';
          document.getElementById('dataSection').style.display='block';
          renderTable();updateStats();
        }
      },
      error(e){document.getElementById('loadingSection').innerHTML=`<p style="color:var(--accent)">Error: ${e.message}</p>`;}
    });
  });

  function processData(data){
    allData=data;filteredData=[...data];
    const teams=[...new Set(data.map(r=>r.Team).filter(Boolean))].sort();
    const contracts=[...new Set(data.map(r=>r['Contract Type']).filter(Boolean))].sort();
    const tf=document.getElementById('teamFilter');
    teams.forEach(t=>tf.innerHTML+=`<option value="${t}">${t}</option>`);
    const cf=document.getElementById('contractFilter');
    contracts.forEach(c=>cf.innerHTML+=`<option value="${c}">${c}</option>`);
  }

  function renderTable(){
    const tbody=document.getElementById('tableBody');tbody.innerHTML='';
    filteredData.forEach(row=>{
      const contractType=row['Contract Type']||'';
      const player=row['Player']||'';
      const team=row['Team']||'';
      const years=row['Years Under Contract']||'';
      const underContract=row['$ Under Contract']||0;
      const projected=row['Projected Value Over Life of Contract(s)']||0;
      const valDiff=row['Value Difference']||0;
      const valDiffNum=parseNumber(valDiff);
      const teamCode=teamNameToCode[team]||team;
      const logo=getLogoUrl(teamCode);
      const tr=document.createElement('tr');
      tr.innerHTML=`
        <td><span class="contract-badge ${getContractClass(contractType)}">${contractType}</span></td>
        <td><div class="logo-cell">${logo?`<img src="${logo}" alt="${team}" class="team-logo">`:''}
          <div><div class="player-name">${player}</div><div class="team-name-text">${teamCode}</div></div></div></td>
        <td>${team}</td>
        <td class="align-right">${years}</td>
        <td class="align-right">${formatCurrency(underContract)}</td>
        <td class="align-right">${formatCurrency(projected)}</td>
        <td class="align-right ${valDiffNum>0?'val-positive':valDiffNum<0?'val-negative':''}">${formatCurrency(valDiff)}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  function filterTable(){
    const s=document.getElementById('searchInput').value.toLowerCase();
    const t=document.getElementById('teamFilter').value;
    const c=document.getElementById('contractFilter').value;
    filteredData=allData.filter(r=>(!s||(r.Player||'').toLowerCase().includes(s))&&(!t||r.Team===t)&&(!c||r['Contract Type']===c));
    renderTable();updateStats();
  }

  function sortTable(col){
    document.querySelectorAll('th').forEach((h,i)=>{h.classList.remove('sorted-asc','sorted-desc');if(i===col)h.classList.add(sortAscending&&sortColumn===col?'sorted-desc':'sorted-asc');});
    if(sortColumn===col)sortAscending=!sortAscending;else{sortColumn=col;sortAscending=true;}
    const keys=['Contract Type','Player','Team','Years Under Contract','$ Under Contract','Projected Value Over Life of Contract(s)','Value Difference'];
    filteredData.sort((a,b)=>{
      let av=a[keys[col]],bv=b[keys[col]];
      if(col>=3){av=parseNumber(av);bv=parseNumber(bv);}else{av=(av||'').toLowerCase();bv=(bv||'').toLowerCase();}
      return sortAscending?(av<bv?-1:av>bv?1:0):(av>bv?-1:av<bv?1:0);
    });
    renderTable();
  }

  function updateStats(){
    const total=filteredData.length;
    let totalUnder=0,totalProj=0,totalDiff=0;
    filteredData.forEach(r=>{totalUnder+=parseNumber(r['$ Under Contract']);totalProj+=parseNumber(r['Projected Value Over Life of Contract(s)']);totalDiff+=parseNumber(r['Value Difference']);});
    document.getElementById('totalPlayers').textContent=total;
    document.getElementById('totalUnderContract').textContent=formatCurrency(totalUnder);
    document.getElementById('totalProjected').textContent=formatCurrency(totalProj);
    document.getElementById('totalDifference').textContent=formatCurrency(totalDiff);
  }
</script>
</body>
</html>
